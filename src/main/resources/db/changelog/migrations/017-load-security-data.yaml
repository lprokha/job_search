databaseChangeLog:
  - changeSet:
      id: 17
      author: Leyla P.
      changes:
        - sql:
            sql: |
              insert into authorities(authority)
              values ('APPLICANT'),
              ('EMPLOYER');
              
              insert into roles(role)
              values ('APPLICANT'),
              ('EMPLOYER');
              
              insert into role_authority(role_id, authority_id)
              select r.id, a.id
              from roles r
              join authorities a on r.role = a.authority;
              
              insert into user_role(user_id, role_id)
              select u.id, r.id
              from users u
              join roles r on r.role = u.account_type;