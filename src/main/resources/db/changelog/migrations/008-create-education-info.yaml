databaseChangeLog:
  - changeSet:
      id: 8
      author: Leyla P.
      changes:
        - createTable:
            tableName: education_info
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: institution
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: program
                  type: varchar(255)
              - column:
                  name: start_date
                  type: date
              - column:
                  name: end_date
                  type: date
              - column:
                  name: degree
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: education_info
            baseColumnNames: resume_id
            constraintName: fk_education_resume
            referencedTableName: resumes
            referencedColumnNames: id