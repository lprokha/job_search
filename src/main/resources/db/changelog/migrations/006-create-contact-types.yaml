databaseChangeLog:
  - changeSet:
      id: 006
      author: Leyla P.
      changes:
        - createTable:
            tableName: contact_types
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: varchar(255)
                  constraints:
                    nullable: false