server:
  port: 8089

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: JobSearch

  mvc:
    static-path-pattern: /static/**

  datasource:
    url: jdbc:h2:./db/job_search;AUTO_SERVER=TRUE
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver



  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  liquibase:
    change-log: classpath:/db/changelog/master.yaml

  mail:
    host: smtp.gmail.com
    username: ${SMTP_USERNAME}
    password: ${SMTP_PWD}
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  file: 
    path: logs
  level:
    root: info
    kg.attractor.job_search: debug

  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"


